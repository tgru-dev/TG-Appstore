name: seerr
services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    restart: unless-stopped
    ports:
      - 5055:5055
    environment:
      - LOG_LEVEL=debug
      - PORT=5055
      - TZ=Europe/Berlin
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      timeout: 3s
      interval: 15s
      retries: 3
      start_period: 20s
    volumes:
      - /DATA/AppData/$AppID/config:/app/config

x-casaos:
  architectures:
    - amd64
    - arm64
  main: seerr
  description:
    en_us: Seerr is a media request management tool that bridges Overseerr/Jellyseerr with your existing Sonarr/Radarr setup, allowing users to discover and request movies and TV shows.
  tagline:
    en_us: Modern media request & discovery platform
  developer: Seerr Team
  author: TG Store
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/seerr.png
  thumbnail: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/seerr.png
  title:
    en_us: Seerr
  category: Media
  port_map: '5055'
